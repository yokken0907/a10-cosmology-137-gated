# Global Debug setting
debug: False

theory:
  classy:
    path: .
    extra_args:
      non_linear: 'halofit'
      N_ncdm: 1
      N_ur: 2.0328

likelihood:
  planck_2018_highl_plik.TTTEEE:
  planck_2018_lowl.TT:
  planck_2018_lowl.EE:
  bao.sdss_dr12_consensus_bao:
  sn.pantheonplus:
  shoes_H0:
    external: 'lambda _self, H0: -0.5 * ((H0 - 73.04) / 1.04)**2'
    requires: [H0]

params:
  H0: {prior: {min: 60, max: 80}, ref: 73.0, proposal: 0.5}
  omega_b: {prior: {min: 0.02, max: 0.025}, ref: 0.02237, proposal: 0.0001}
  omega_cdm: {prior: {min: 0.10, max: 0.14}, ref: 0.119, proposal: 0.001}
  A_s: {prior: {min: 1.5e-9, max: 3.0e-9}, ref: 2.1e-9, proposal: 0.01e-9}
  n_s: {prior: {min: 0.92, max: 1.0}, ref: 0.965, proposal: 0.001}
  tau_reio: {prior: {min: 0.04, max: 0.08}, ref: 0.055, proposal: 0.001}

  # --- Run D: Test the range up to 1,000,000 (log10=6) ---
  ua10_log10V0:
    prior: {min: 0.0, max: 6.0}      # 上限をあえて1桁下げる
    ref: 4.6
    proposal: 0.1
    drop: true
  ua10_V0:
    value: "lambda ua10_log10V0: 10**ua10_log10V0"
    derived: false

  ua10_phi_trigger: 137.47          # 比較のため137固定
  
  ua10_f_ax: {prior: {min: 0.001, max: 0.2}, ref: 0.12, proposal: 0.005}
  ua10_Gamma0: {prior: {min: 0.001, max: 0.05}, ref: 0.016, proposal: 0.001}
  ua10_n_ax: 2.5

sampler:
  mcmc:
    covmat: auto
    learn_proposal: true
    proposal_scale: 1.9
    Rminus1_stop: 0.01

output: chains/run_D_sensitivity