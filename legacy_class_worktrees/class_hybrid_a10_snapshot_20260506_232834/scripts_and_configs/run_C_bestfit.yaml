output: chains/run_C_bestfit_fixed

theory:
  classy:
    path: .
    extra_args:
      non_linear: halofit
      N_ncdm: 1
      N_ur: 2.0328

likelihood:
  planck_2018_highl_plik.TTTEEE:
    path: null
    clik_file: baseline/plc_3.0/hi_l/plik/plik_rd12_HM_v22b_TTTEEE.clik
    prior:
      SZ: 'lambda ksz_norm, A_sz: stats.norm.logpdf(ksz_norm+1.6*A_sz, loc=9.5, scale=3.0)'
  planck_2018_lowl.TT:
  planck_2018_lowl.EE:
  bao.sdss_dr12_consensus_bao:
  sn.pantheonplus:
  shoes_H0:
    external: 'lambda _self, H0: -0.5 * ((H0 - 73.04) / 1.04)**2'
    requires: [H0]

params:
  # --- 標準パラメータ ---
  H0:
    prior: {min: 60, max: 80}
    ref: 68.206
  omega_b:
    prior: {min: 0.02, max: 0.025}
    ref: 0.0223
  omega_cdm:
    prior: {min: 0.10, max: 0.14}
    ref: 0.1194
  A_s:
    prior: {min: 1.5e-9, max: 3.0e-9}
    ref: 2.1e-9
  n_s:
    prior: {min: 0.92, max: 1.0}
    ref: 0.965
  tau_reio:
    prior: {min: 0.04, max: 0.08}
    ref: 0.055

  # --- A10 理論パラメータ ---
  # V0 は線形ではなく対数で探索し、初期化時の暴走を防ぐ
  log10_ua10_V0:
    prior: {min: -10, max: 5}
    ref: 0.0
    proposal: 0.5
    drop: True
  ua10_V0:
    value: 'lambda log10_ua10_V0: 10**log10_ua10_V0'

  # ゲート位置は a10_gate を唯一の自由パラメータにし、
  # ua10_phi_trigger とは常に同一値を渡す
  a10_gate:
    prior: {min: 120, max: 155}
    ref: 137.47
    proposal: 1.0
  ua10_phi_trigger:
    value: 'lambda a10_gate: a10_gate'

  ua10_f_ax: 0.1
  ua10_Gamma0: 1.0
  ua10_n_ax: 2.5

sampler:
  minimize:
    method: bobyqa
    ignore_prior: True
    max_evals: 1000

debug: True
stop_at_error: True
