theory:
  classy:
    path: /home/kei/class_hybrid_a10
    extra_args:
      non_linear: 'halofit'
      N_ncdm: 1
      N_ur: 2.0328

likelihood:
  planck_2018_highl_plik.TTTEEE:
  planck_2018_lowl.TT:
  planck_2018_lowl.EE:
  bao.sdss_dr12_consensus_bao:
  sn.pantheonplus:

params:
  # --- Base LCDM (着火しやすい安全な値を指定) ---
  H0:
    prior: [60, 80]
    ref: 68.0
    proposal: 0.2
  omega_b:
    prior: [0.02, 0.025]
    ref: 0.0224
    proposal: 0.0001
  omega_cdm:
    prior: [0.10, 0.14]
    ref: 0.120
    proposal: 0.001
  A_s:
    prior: [1.5e-9, 3.0e-9]
    ref: 2.1e-9
    proposal: 0.05e-9
  n_s:
    prior: [0.92, 1.0]
    ref: 0.965
    proposal: 0.004
  tau_reio:
    prior: [0.04, 0.08]
    ref: 0.054
    proposal: 0.005

  m_ncdm: 0.06

  # --- A10 EDE Parameters (最小限の注入から開始) ---
  ua10_f_ax:
    prior: [0.001, 0.2]
    ref: 0.005
    proposal: 0.002
  ua10_V0:
    prior: [0.001, 0.1]
    ref: 0.01
    proposal: 0.005
  ua10_Gamma0:
    prior: [0.001, 0.05]
    ref: 0.001
    proposal: 0.0005
  ua10_phi_trigger:
    prior: [130, 145]
    ref: 137.036
    proposal: 0.05
  ua10_n_ax: 2.5

sampler:
  mcmc:
    drag: true
    oversample_power: 0.4
    proposal_scale: 1.9
    covmat: auto
    Rminus1_stop: 0.02
    burn_in: 100
    max_tries: 5000

output: chains/a10_scout_H0_72