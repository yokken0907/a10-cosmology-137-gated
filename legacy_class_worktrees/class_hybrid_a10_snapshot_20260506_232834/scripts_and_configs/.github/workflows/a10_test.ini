# --- 基本的な宇宙論パラメータ (Planck 2018準拠) ---
H0 = 67.36
omega_b = 0.02237
omega_cdm = 0.1200
A_s = 2.1e-9
n_s = 0.9649
tau_reio = 0.0544

# --- Unified A10 パラメータ ---
has_unified_a10 = yes
ua10_phi_ini = 1.0

# --- 出力設定 ---
output = tCl, pCl, mPk
write background = yes
write thermodynamics = no
root = output/a10_test_

background_verbose = 3
input_verbose = 3
thermodynamics_verbose = 3
perturbations_verbose = 3
spectra_verbose = 3

# --- Unified A10 Model Parameters ---
ua10_V0          = 0.05
ua10_f_ax        = 0.1
ua10_n_ax        = 1.0
ua10_phi_trigger = 0.045
ua10_Delta_phi   = 0.02
ua10_Gamma0      = 1000.0

gauge = newtonian

# 精度を上げるための設定
tol_perturbations_integration = 1e-6
perturbations_sampling_stepsize = 0.01