theory:
  classy:
    path: .
    extra_args:
      non_linear: halofit
      N_ncdm: 1
      N_ur: 2.0328
likelihood:
  planck_2018_highl_plik.TTTEEE:
    path: null
    clik_file: baseline/plc_3.0/hi_l/plik/plik_rd12_HM_v22b_TTTEEE.clik
    prior:
      SZ: 'lambda ksz_norm, A_sz: stats.norm.logpdf(ksz_norm+1.6*A_sz, loc=9.5, scale=3.0)'
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  bao.sdss_dr12_consensus_bao: null
  sn.pantheonplus: null
  shoes_H0:
    external: 'lambda _self, H0: -0.5 * ((H0 - 73.04) / 1.04)**2'
    requires:
    - H0
params:
  H0:
    prior:
      min: 60
      max: 80
    ref:
      min: 67.0
      max: 70.0
  omega_b:
    prior:
      min: 0.02
      max: 0.025
    ref:
      min: 0.022
      max: 0.0228
  omega_cdm:
    prior:
      min: 0.1
      max: 0.14
    ref:
      min: 0.115
      max: 0.125
  A_s:
    prior:
      min: 1.5e-09
      max: 3.0e-09
    ref:
      min: 2.0e-09
      max: 2.2e-09
  n_s:
    prior:
      min: 0.92
      max: 1.0
    ref:
      min: 0.95
      max: 0.98
  tau_reio:
    prior:
      min: 0.04
      max: 0.08
    ref:
      min: 0.05
      max: 0.06
  ua10_V0: 0
  ua10_phi_trigger: 137.47
  ua10_f_ax: 0.1
  ua10_Gamma0: 0
  ua10_n_ax: 2.5
sampler:
  minimize:
    method: bobyqa
    ignore_prior: false
    max_evals: 10000
output: run_A_bestfit
