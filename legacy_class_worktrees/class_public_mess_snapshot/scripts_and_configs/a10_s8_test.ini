# -----------------------------------------------------------------
# 吉村A10モデル：H0-S8テンション同時検証用設定ファイル
# -----------------------------------------------------------------

# 1. 出力項目の指定（S8算出のためにmPkを有効化）
output = tCl, pCl, lCl, mPk
P_k_max_h/Mpc = 1.0
z_max_pk = 0.0

# 2. 基本的な宇宙論パラメータ（Planck 2018ベース）
# ハッブル定数を高め（72）に設定してテンション解消を狙う
h = 0.72
omega_b = 0.02237
omega_cdm = 0.1200
A_s = 2.099e-9
n_s = 0.9649
tau_reio = 0.0544

# 3. ニュートリノ設定（標準的な1個の重いニュートリノ）
N_ur = 2.0328
N_ncdm = 1
m_ncdm = 0.06

# 4. 吉村A10モデル特有のパラメータ
# z ≈ 5000 での局所的エネルギー注入
z_trigger = 5000.0
a10_frac_y_ini = 0.03
a10_gamma_peak = 0.5

# 5. 計算精度と表示の設定
write background = yes
write parameters = yes
verbose = 1
# -----------------------------------------------------------------