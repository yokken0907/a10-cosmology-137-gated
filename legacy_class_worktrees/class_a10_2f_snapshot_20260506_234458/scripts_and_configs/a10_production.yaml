theory:
  classy:
    extra_args:
      non_linear: 'halofit'  # 物質分配の非線形進化（フル解析の標準）
      N_ncdm: 1
      N_ur: 2.0328

likelihood:
  # 宇宙論の「三種の神器」を全開放
  planck_2018_highl_plik.TTTEEE:
  planck_2018_lowl.TT:
  planck_2018_lowl.EE:
  bao.sdss_dr12_consensus_bao:
  sn.pantheonplus:

params:
  # --- Base LCDM Parameters (Planck 2018 best-fit 付近を初期値に) ---
  H0:
    prior: [60, 80]
    ref: 67.5
    proposal: 0.5
  omega_b:
    prior: [0.02, 0.025]
    ref: 0.0224
    proposal: 0.0001
  omega_cdm:
    prior: [0.10, 0.14]
    ref: 0.120
    proposal: 0.001
  A_s:
    prior: [1.5e-9, 3.0e-9]
    ref: 2.1e-9
    proposal: 0.05e-9
  n_s:
    prior: [0.92, 1.0]
    ref: 0.965
    proposal: 0.004
  tau_reio:
    prior: [0.04, 0.08]
    ref: 0.054
    proposal: 0.005

  m_ncdm: 0.06

  # --- A10 EDE Parameters ---
  # 摂動計算の暴走を防ぐため、LCDMに近い「安全な極小値」からスタート
  ua10_f_ax:
    prior: [0.001, 0.2]
    ref: 0.01
    proposal: 0.01
  ua10_V0:
    prior: [0.001, 0.1]
    ref: 0.01
    proposal: 0.005
  ua10_Gamma0:
    prior: [0.001, 0.05]
    ref: 0.005
    proposal: 0.001
  ua10_phi_trigger: 1e-4  # 固定
  ua10_n_ax: 2.5          # 固定

sampler:
  mcmc:
    drag: true            # 計算速度を上げるための標準アルゴリズム
    oversample_power: 0.4 # 重い計算（CLASS）の呼び出しを最適化
    proposal_scale: 1.9
    covmat: auto          # 共分散行列を自動学習
    Rminus1_stop: 0.02    # 収束判定（0.02を切ったら自動終了）
    burn_in: 50
    max_tries: 1000

output: chains/a10_prod_run
