packages_path: ./cobaya_packages

theory:
  classy:
    path: /home/kei/class_a10_2f
    extra_args:
      has_a10_2f: 'yes'
      a10_npost: 2.0
      a10_xi137: 137.036
      a10_gamma0: 0.0
      a10_cs_model: 1
      lensing: 'yes'
      N_ur: 2.0328
      N_ncdm: 1
      m_ncdm: 0.06
      T_ncdm: 0.71611
      tol_background_integration: 1e-3
      tol_perturb_integration: 1e-4
    renames:
      A_s: 'lambda logA: 1e-10 * np.exp(logA)'

params:
  # --- Standard Cosmological Parameters ---
  # 初期値(ref)をガチガチに固定し、歩幅(proposal)を非常に小さくする
  h:
    prior:
      min: 0.6
      max: 0.8
    ref: 0.6736
    proposal: 0.001
  omega_b:
    prior:
      min: 0.02
      max: 0.025
    ref: 0.02237
    proposal: 0.00001
  omega_cdm:
    prior:
      min: 0.1
      max: 0.15
    ref: 0.1200
    proposal: 0.0001
  tau_reio:
    prior:
      min: 0.01
      max: 0.08
    ref: 0.0544
    proposal: 0.001
  n_s:
    prior:
      min: 0.9
      max: 1.1
    ref: 0.9649
    proposal: 0.001
  logA:
    prior:
      min: 2.5
      max: 3.5
    ref: 3.044
    proposal: 0.001
    latex: \ln(10^{10} A_s)

  # --- A10-2F-EF Extended Parameters ---
  a10_fede_peak:
    prior:
      min: 0.001
      max: 0.2
    ref: 0.1
    proposal: 0.001
    latex: f_{EDE}
  a10_log10zc:
    prior:
      min: 3.0
      max: 4.5
    ref: 3.52
    proposal: 0.005
    latex: \log_{10}(z_c)
  a10_dlogatrig:
    value: 0.1

likelihood:
  planck_2018_lowl.TT:
  planck_2018_lowl.EE:
  planck_2018_highl_plik.TTTEEE:
  planck_2018_lensing.clik:

sampler:
  mcmc:
    Rminus1_stop: 0.02
    max_tries: 10000   # 念のため試行回数を1万回に拡張
    covmat: auto
    burn_in: 0         # 即座にサンプリング開始

output: chains/a10_mcmc_run
