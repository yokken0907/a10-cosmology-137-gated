# --- CDM有効変形モデルの単体テスト用パラメータ ---

# 1. 標準CDMをゼロにし、有効流体(fld)に置き換える
Omega_cdm = 0.0
Omega_fld = 0.265

# 2. ハイジャックしたパラメータの入力（ベンチマーク値）
fluid_equation_of_state = CLP
w0_fld = 0.05    # 振幅パラメータ Delta_0
wa_fld = 2.0     # 時間発展インデックス n
cs2_fld = 1e-6   # 静止系実効音速（極限して微小な値）

# 3. 出力設定（背景進化のデータを出力する）
write background = yes
